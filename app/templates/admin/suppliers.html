{% extends 'base.html' %}
{% block title %}Gestione Fornitori{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0"><i class="bi bi-building"></i> Fornitori</h4>
</div>

<!-- Form aggiunta -->
<div class="card mb-4" style="max-width:400px">
  <div class="card-body">
    <form method="post" action="{{ url_for('admin.nuovo_fornitore') }}" class="d-flex gap-2">
      <input type="text" name="nome" class="form-control" placeholder="Nome fornitore" required>
      <button type="submit" class="btn btn-primary text-nowrap">
        <i class="bi bi-plus"></i> Aggiungi
      </button>
    </form>
  </div>
</div>

<div class="table-responsive">
  <table class="table table-hover align-middle">
    <thead class="table-primary">
      <tr>
        <th>Nome</th>
        <th>Stato</th>
        <th>Azioni</th>
      </tr>
    </thead>
    <tbody>
      {% for f in fornitori %}
      <tr class="{% if not f.attivo %}table-secondary text-muted{% endif %}">
        <td>{{ f.nome }}</td>
        <td>
          <span class="badge {% if f.attivo %}bg-success{% else %}bg-secondary{% endif %}">
            {{ 'Attivo' if f.attivo else 'Disabilitato' }}
          </span>
        </td>
        <td>
          <form method="post" action="{{ url_for('admin.toggle_fornitore', id=f.id) }}"
                class="d-inline">
            <button type="submit"
                    class="btn btn-sm {% if f.attivo %}btn-outline-warning{% else %}btn-outline-success{% endif %}">
              {{ 'Disabilita' if f.attivo else 'Abilita' }}
            </button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
