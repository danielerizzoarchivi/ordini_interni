{% extends 'base.html' %}
{% block title %}{% if utente %}Modifica Utente{% else %}Nuovo Utente{% endif %}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">
    <i class="bi bi-person-gear"></i>
    {% if utente %}Modifica: {{ utente.nome_completo }}{% else %}Nuovo utente{% endif %}
  </h4>
  <a href="{{ url_for('admin.utenti') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Indietro
  </a>
</div>

<div class="card" style="max-width:500px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome *</label>
        <input type="text" name="nome" class="form-control" required
               value="{{ utente.nome if utente else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Cognome *</label>
        <input type="text" name="cognome" class="form-control" required
               value="{{ utente.cognome if utente else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email *</label>
        <input type="email" name="email" class="form-control" required
               value="{{ utente.email if utente else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">
          Password {% if utente %}(lascia vuoto per non cambiare){% else %}*{% endif %}
        </label>
        <input type="password" name="password" class="form-control"
               {% if not utente %}required{% endif %} minlength="6">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Ruolo</label>
        <select name="ruolo" class="form-select">
          <option value="utente" {% if not utente or utente.ruolo=='utente' %}selected{% endif %}>
            Utente
          </option>
          <option value="admin" {% if utente and utente.ruolo=='admin' %}selected{% endif %}>
            Amministratore
          </option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-save"></i>
        {% if utente %}Salva{% else %}Crea utente{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
